name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload archives

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Default token: creates the Release in THIS repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on henrypoydar/homebrew-tap, so the formula
          # can be committed to that separate repo. Add it under
          # Settings → Secrets and variables → Actions.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
