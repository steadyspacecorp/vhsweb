# GoReleaser config — cross-compiles vhsweb and publishes the release archives
# that install.sh downloads.
# Local dry run:  goreleaser release --snapshot --clean
# Real release:   git tag v0.1.0 && git push origin v0.1.0  (CI runs goreleaser)
version: 2

project_name: vhsweb

before:
  hooks:
    - go mod tidy

builds:
  - id: vhsweb
    main: .
    binary: vhsweb
    env:
      - CGO_ENABLED=0 # pure Go; lets us cross-compile freely
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: vhsweb
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
